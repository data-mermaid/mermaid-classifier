# Training run: 192 CoralNet sources (from coralnet_best_sources, filtered
# to InS3=TRUE) with the top-108 benthic-attribute hierarchy.
#
# included_labels.csv and rollups.csv are copied verbatim from
# sagemaker/configs/coralnet_top108/ (generated 2026-05-08 by
# scripts/generate_training_config.py). Regenerate from the latest
# MERMAID API if the taxonomy has drifted.

dataset:
  include_mermaid: false
  coralnet_sources_csv: sources.csv
  drop_growthforms: false
  label_rollup_spec_csv: rollups.csv
  included_labels_csv: included_labels.csv
  ref_val_ratios: [0.1, 0.1]
  # Class-balanced subsampling. total_annotations is the upper bound;
  # smaller classes are kept in full once min_per_class floors them.
  # Scaled down proportionally from the 327-source config (1,770,000)
  # to account for the smaller source set.
  subsample:
    strategy: balanced
    total_annotations: 1040000
    min_per_class: 200
  weighting:
    enabled: true
    weight_ratio_cap: 5000.0

training:
  epochs: 40
  early_stopping_patience: 3

mlflow:
  experiment_name: coralnet-top108-192best
  model_name: top108-192best-v1

env:
  # MLFLOW_TRACKING_SERVER is set by the launcher from --mlflow-tracking-uri;
  # do not override here.
  WEIGHTS_LOCATION: s3://mermaid-config/classifier/v1/efficientnet_weights.pt
  CORALNET_TRAIN_DATA_BUCKET: 2605-coralnet-public-sources
  MERMAID_TRAIN_DATA_BUCKET: coral-reef-training
  TRAINING_INPUTS_PERCENT_MISSING_ALLOWED: "5"
  MLFLOW_HTTP_REQUEST_MAX_RETRIES: "2"
